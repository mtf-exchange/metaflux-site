<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#0a0c12"/>
      <stop offset="1"   stop-color="#06070b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- pride bar across the top -->
  <rect x="8"  y="10" width="14" height="3" fill="#5BCEFA"/>
  <rect x="22" y="10" width="14" height="3" fill="#F5A9B8"/>
  <rect x="36" y="10" width="14" height="3" fill="#ffffff"/>
  <!-- wordmark glyphs: M (blue) + F (pink) — stylised, lock-up reads as a unit -->
  <text x="32" y="50" text-anchor="middle"
        font-family="-apple-system, 'Geist', system-ui, sans-serif"
        font-size="30" font-weight="700" letter-spacing="-1.2">
    <tspan fill="#5BCEFA">M</tspan><tspan fill="#F5A9B8">F</tspan>
  </text>
</svg>
